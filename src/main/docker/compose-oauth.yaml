name: collector
services:

  proxy:
    container_name: collector_proxy
    image: nginx
    ports:
      - "8889:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - default
    depends_on:
      api:
        condition: service_healthy

  # Mongo Database Container
  mongo:
    container_name: collector_mongo
    image: mongo:5.0.16
    ports:
      - "127.0.0.1:27019:27017"
    volumes:
      - type: volume
        source: collector_mongo-db
        target: /data/db
    networks:
      - database
        # ATTENTION: Never, and I mean NEVER use something like the following on a production setup!!!!!!!!!!!!!
    healthcheck:
      test: |
        test $$(mongosh --quiet --eval "try { rs.initiate({ _id: 'cyface', members: [{ _id: 0, host: 'mongo:27017' }] }).ok } catch (_) { rs.status().ok }") -eq 1
        interval: 10s
        start_period: 30s
    environment:
      - MONGO_INITDB_DATABASE=cyface
    command: [ "--replSet", "cyface", "--bind_ip", "localhost,mongo"]

  # The Cyface Collector API Container
  api:
    container_name: collector_api
    build: container-oauth
    image: data-collector:0.0.0
    ports:
      # Binds to localhost by default. Set API_BIND_ADDRESS=0.0.0.0 in .env
      # to expose to LAN (see .env.template).
      - "${API_BIND_ADDRESS:-127.0.0.1}:8080:8080"
    networks:
      - database
      - authentication
      - default
    volumes:
      - ./app/logs:/app/logs
      - ./container-oauth/logback.xml:/app/logback.xml:ro # read only
      - ./app/file-uploads:/app/file-uploads # for debugging
    depends_on:
      - mongo
      - authentication
    environment:
      - CYFACE_OAUTH_SECRET=**********
      - CYFACE_OAUTH_SITE=http://authentication:8080/realms/{tenant}
      - CYFACE_OAUTH_CALLBACK=http://api:8080/callback
      # Set to `/` or else the openapi listens by default at `/` but the pre-request `response.header.location` points
      # to `/api/v4` as `entrypoint.sh` defaults to `CYFACE_API_ENDPOINT=/api/v4`.
      - CYFACE_API_ENDPOINT=/
      - CYFACE_HTTP_PORT=8889
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/" ]


  # Keycloak Authentication Server.
  #
  # The realm export hardcodes `frontendUrl=http://authentication:8080`
  # (see rfr-realm_VERSION_see-keycloak-image-repo.json). This is the
  # original RFR-774 fix and supports the in-Docker API + "thin" external
  # client (postman, Android, iOS, curl) flow:
  #   - The collector API container reaches Keycloak at authentication:8080.
  #   - External thin clients hit Keycloak via the host port mapping at
  #     localhost:8081 and get a token whose `iss` is
  #     `http://authentication:8080` regardless of the URL used.
  #   - The API validates `iss` against authentication:8080 -> match.
  #   - Thin clients never do OIDC discovery and never validate the token
  #     themselves, so the unreachable-from-host authentication URL inside
  #     the discovery doc does not matter for them.
  #
  # This setup will NOT work with a SPA / web-app client because SPAs DO
  # fetch the OIDC discovery doc and validate JWKS -- with hardcoded
  # frontendUrl those URLs point at unreachable-from-host
  # authentication:8080. For SPA-friendly local dev, run the standalone
  # Keycloak from cyface/keycloak-image (./start-dev.sh) which uses
  # frontendUrl="" on the radsim realm.
  #
  # The realm JSON is a verbatim copy of the canonical version maintained
  # in the cyface/keycloak-image repo (data/import/rfr-realm_VERSION.json)
  # -- edit there first, re-sync here. The full RFR-774 explanation lives
  # in cyface/keycloak-image/docker-compose.dev.yml.
  authentication:
    container_name: collector_authentication
    image: quay.io/keycloak/keycloak:22.0.1
    ports:
      - "127.0.0.1:8081:8080"
    networks:
      - authentication
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    command: start-dev --import-realm
    volumes:
      - ./keycloak/providers:/opt/keycloak/providers
      - ./keycloak/data:/opt/keycloak/data
      - ./keycloak/themes:/opt/keycloak/themes
    depends_on:
      - mailpit

  # Fake SMTP server that captures every outgoing email and exposes a web UI.
  # Inspect mails at http://localhost:8025 (subject, from, to, body, HTML).
  # Keycloak is configured to deliver mail to mailpit:1025 via the realm's
  # smtpServer block (see keycloak/data/import/rfr-realm_VERSION_see-keycloak-image-repo.json).
  mailpit:
    container_name: collector_mailpit
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:8025:8025"  # Web UI
      - "127.0.0.1:1025:1025"  # SMTP (also reachable from host for debugging)
    networks:
      - authentication
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

volumes:
  collector_mongo-db:

networks:
  default:
    name: cyface-collector
    ipam:
      driver: default
      config:
        # Configure the IP Address range to not conflict with Deutsche Bahn Wi-Fi
        - subnet: 172.72.0.0/24
        - subnet: 2001:3984:3989::/64
  # Shared docker network. Allows "provider" docker container to access APIs without exposing them to the outside world
  database:
    name: cyface-collector_database
  authentication:
    name: cyface-collector_authentication
  proxy:
    name: cyface-collector_proxy
